<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markdown Viewer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" media="(prefers-color-scheme: light)" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" media="(prefers-color-scheme: dark)" />

<style>
  :root {
    --bg: #ffffff;
    --surface: #f4f4f6;
    --border: #d6d6db;
    --text: #1a1a1a;
    --text-muted: #56565e;
    --accent: #3457d5;
    --accent-hover: #2540ad;
    --accent-text: #ffffff;
    --danger: #b3261e;
    --success: #1e7d32;
    --radius: 6px;
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1e;
      --surface: #25252a;
      --border: #3c3c43;
      --text: #e9e9ec;
      --text-muted: #b0b0b8;
      --accent: #8ca0f5;
      --accent-hover: #a3b4f7;
      --accent-text: #14141a;
      --danger: #ff8a7a;
      --success: #6fd388;
    }
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
  }

  button, input, textarea {
    font-family: inherit;
    color: inherit;
  }

  button:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ── Toolbar ──────────────────────────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .toolbar button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }

  .toolbar button:hover { border-color: var(--accent); color: var(--accent-hover); }

  .toolbar button.copied { background: var(--success); border-color: var(--success); color: #fff; }

  #filename-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 13px;
    min-width: 140px;
  }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }

  .file-drop {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
  }

  .file-drop:hover, .file-drop.drag-over {
    border-color: var(--accent);
    color: var(--accent-hover);
  }

  .file-drop input[type="file"] {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    opacity: 0;
  }

  .toolbar-spacer { flex: 1; }

  /* ── Split layout ─────────────────────────────────────────────────────── */
  .split-container {
    flex: 1;
    display: flex;
    min-height: 0;
    overflow: hidden;
  }

  .pane {
    flex: 1 1 50%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #editor {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    padding: 16px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
  }

  #editor:focus-visible { outline: none; }

  .preview-pane { overflow: hidden; }

  #preview {
    flex: 1;
    overflow: auto;
    padding: 16px 22px;
  }

  #error-banner {
    background: var(--danger);
    color: #fff;
    padding: 8px 14px;
    font-size: 13px;
    flex-shrink: 0;
  }

  #divider {
    flex: 0 0 6px;
    background: var(--border);
    cursor: col-resize;
  }

  #divider:hover, #divider.dragging { background: var(--accent); }

  @media (max-width: 720px) {
    .split-container { flex-direction: column; }
    #divider { flex: 0 0 6px; width: 100%; height: 6px; cursor: row-resize; }
  }

  /* ── Preview content ──────────────────────────────────────────────────── */
  #preview [data-line] { margin: 0; }
  #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 { margin: 1em 0 0.5em; }
  #preview p { margin: 0.6em 0; }
  #preview pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    overflow-x: auto;
  }
  #preview :not(pre) > code {
    background: var(--surface);
    border-radius: 4px;
    padding: 2px 5px;
    font-family: var(--font-mono);
    font-size: 0.9em;
  }
  #preview pre code { font-family: var(--font-mono); font-size: 0.85em; background: none; padding: 0; }
  #preview table { border-collapse: collapse; margin: 0.8em 0; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 6px 10px; }
  #preview th { background: var(--surface); }
  #preview blockquote {
    margin: 0.6em 0;
    padding: 2px 14px;
    border-left: 3px solid var(--accent);
    color: var(--text-muted);
  }
  #preview img { max-width: 100%; }
  #preview a { color: var(--accent); }
  #preview .katex-error { color: #cc0000; }

  /* ── Table editor dialog ──────────────────────────────────────────────── */
  dialog#table-dialog {
    width: min(720px, 92vw);
    max-height: 85vh;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    padding: 0;
  }

  dialog#table-dialog::backdrop { background: rgba(0,0,0,0.4); }

  .dialog-body { padding: 18px 20px; overflow: auto; max-height: 85vh; }

  .dialog-body h2 { font-size: 15px; margin: 0 0 14px; }

  .dialog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }

  .dialog-body label { font-size: 12px; font-weight: 600; color: var(--text-muted); }

  .dialog-body input[type="number"] {
    width: 70px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 8px;
  }

  #header-inputs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 10px; }

  .header-col { display: flex; align-items: center; gap: 4px; min-width: 90px; flex: 1; }

  .header-col input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 7px;
    font-size: 13px;
  }

  .col-delete-btn, .row-delete-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: var(--radius);
    padding: 3px 7px;
  }

  .col-delete-btn:hover:not(:disabled), .row-delete-btn:hover:not(:disabled) {
    color: var(--danger);
    border-color: var(--danger);
  }

  .col-delete-btn:disabled, .row-delete-btn:disabled { opacity: 0.25; cursor: default; }

  .table-wrap { overflow-x: auto; margin-bottom: 10px; }

  #editor-table { border-collapse: collapse; width: 100%; min-width: 320px; }

  #editor-table td, #editor-table th { padding: 3px; }

  #editor-table th { font-size: 11px; color: var(--text-muted); text-align: left; }

  #editor-table textarea {
    width: 100%;
    min-width: 80px;
    min-height: 30px;
    max-height: 80px;
    resize: none;
    font-family: var(--font-mono);
    font-size: 12.5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    color: var(--text);
  }

  .num-cell, .num-header {
    width: 28px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  #add-row-btn { margin-bottom: 14px; }

  .auto-number-row { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
  .auto-number-row label { font-weight: 400; color: var(--text); font-size: 13px; }

  .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }

  .btn-secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
  }

  .btn-accent {
    background: var(--accent);
    border: 1px solid var(--accent);
    color: var(--accent-text);
    border-radius: var(--radius);
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-secondary:hover { border-color: var(--accent); }
  .btn-accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
</style>
</head>
<body>

<header class="toolbar">
  <button id="table-btn" type="button">Table</button>

  <label for="filename-input" class="sr-only">Output filename</label>
  <input type="text" id="filename-input" value="untitled.md" aria-label="Output filename" />

  <button id="copy-btn" type="button">Copy</button>
  <button id="download-btn" type="button">Download</button>

  <label class="file-drop" id="file-drop" for="file-input">
    <span>Drop .md file or choose…</span>
    <input type="file" id="file-input" accept=".md,text/markdown" aria-label="Upload a Markdown file" />
  </label>

  <div class="toolbar-spacer"></div>
</header>

<div id="error-banner" role="alert" hidden></div>

<main class="split-container">
  <section class="pane editor-pane">
    <label for="editor" class="sr-only">Markdown source</label>
    <textarea id="editor" spellcheck="false"></textarea>
  </section>

  <div id="divider" role="separator" aria-label="Resize panes" aria-orientation="vertical"></div>

  <section class="pane preview-pane">
    <div id="preview" aria-live="off"></div>
  </section>
</main>

<dialog id="table-dialog" aria-label="Table editor">
  <div class="dialog-body">
    <h2>Table editor</h2>

    <div class="dialog-row">
      <label for="col-count-input">Columns</label>
      <input type="number" id="col-count-input" min="1" max="12" value="3" />
    </div>

    <div id="header-inputs"></div>

    <div class="table-wrap">
      <table id="editor-table">
        <thead><tr id="table-header-row"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <button id="add-row-btn" class="btn-secondary" type="button">+ Add row</button>

    <div class="auto-number-row">
      <input type="checkbox" id="auto-number-checkbox" />
      <label for="auto-number-checkbox">Auto-number rows (#)</label>
    </div>

    <div class="dialog-actions">
      <button id="table-cancel-btn" class="btn-secondary" type="button">Cancel</button>
      <button id="table-done-btn" class="btn-accent" type="button">Done</button>
    </div>
  </div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<script>
(function () {
  'use strict';

  // ── DOM refs ─────────────────────────────────────────────────────────────
  var editor        = document.getElementById('editor');
  var preview       = document.getElementById('preview');
  var errorBanner   = document.getElementById('error-banner');
  var filenameInput = document.getElementById('filename-input');
  var copyBtn       = document.getElementById('copy-btn');
  var downloadBtn   = document.getElementById('download-btn');
  var fileInput     = document.getElementById('file-input');
  var fileDrop       = document.getElementById('file-drop');
  var divider       = document.getElementById('divider');
  var splitContainer = document.querySelector('.split-container');
  var editorPane    = document.querySelector('.editor-pane');
  var previewPane   = document.querySelector('.preview-pane');
  var tableBtn      = document.getElementById('table-btn');
  var tableDialog   = document.getElementById('table-dialog');

  var STORAGE_CONTENT  = 'mdviewer:content';
  var STORAGE_FILENAME = 'mdviewer:filename';

  // ── LaTeX delimiter preprocessing ───────────────────────────────────────
  // Converts \( \) -> $ $ and \[ \] -> $$ $$, skipping fenced code blocks
  // and inline code spans so literal backslashes in code aren't mangled.
  function preprocessLatexDelimiters(src) {
    var lines = src.split('\n');
    var inFence = false;
    var fenceChar = '';
    var fenceLen = 0;

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var fenceMatch = line.match(/^\s*(`{3,}|~{3,})/);

      if (fenceMatch) {
        var marker = fenceMatch[1];
        if (!inFence) {
          inFence = true;
          fenceChar = marker[0];
          fenceLen = marker.length;
        } else if (marker[0] === fenceChar && marker.length >= fenceLen) {
          inFence = false;
        }
        continue; // leave fence delimiter lines untouched
      }

      if (inFence) continue;

      lines[i] = replaceOutsideInlineCode(line);
    }

    return lines.join('\n');
  }

  function replaceOutsideInlineCode(line) {
    var parts = line.split(/(`[^`]*`)/);
    for (var i = 0; i < parts.length; i++) {
      if (i % 2 === 1) continue; // inline code span, leave untouched
      parts[i] = parts[i]
        .replace(/\\\(/g, '$').replace(/\\\)/g, '$')
        .replace(/\\\[/g, '$$').replace(/\\\]/g, '$$');
    }
    return parts.join('');
  }

  // ── Markdown rendering (marked + highlight.js + data-line tagging) ─────
  var hljsRenderer = new marked.Renderer();
  hljsRenderer.code = function (code, infostring) {
    var lang = (infostring || '').match(/\S*/)[0];
    var highlighted;
    try {
      highlighted = (lang && hljs.getLanguage(lang))
        ? hljs.highlight(code, { language: lang }).value
        : hljs.highlightAuto(code).value;
    } catch (e) {
      highlighted = escapeHtml(code);
    }
    return '<pre><code class="hljs">' + highlighted + '</code></pre>';
  };

  var markedOptions = { gfm: true, breaks: false, renderer: hljsRenderer };

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function countNewlines(s) {
    var n = 0;
    for (var i = 0; i < s.length; i++) if (s[i] === '\n') n++;
    return n;
  }

  function renderMarkdownToHtml(rawSrc) {
    var src = preprocessLatexDelimiters(rawSrc);
    var tokens = marked.lexer(src, markedOptions);
    var cursor = 0;
    var line = 1;
    var html = '';

    for (var i = 0; i < tokens.length; i++) {
      var token = tokens[i];
      var idx = src.indexOf(token.raw, cursor);
      if (idx === -1) idx = cursor;

      line += countNewlines(src.slice(cursor, idx));
      var startLine = line;
      cursor = idx + token.raw.length;
      line += countNewlines(token.raw);

      if (token.type === 'space') continue;

      var single = [token];
      single.links = tokens.links;
      var innerHtml = marked.parser(single, markedOptions);
      html += '<div data-line="' + startLine + '">' + innerHtml + '</div>';
    }

    return html;
  }

  function renderMath(container) {
    renderMathInElement(container, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ],
      throwOnError: false
    });
  }

  // ── Render pipeline (debounced, error-safe) ─────────────────────────────
  var renderTimer = null;
  var pendingScroll = false;

  function showError(message) {
    errorBanner.textContent = 'Render error: ' + message;
    errorBanner.hidden = false;
  }

  function hideError() {
    errorBanner.hidden = true;
  }

  function doRender() {
    var html;
    try {
      html = renderMarkdownToHtml(editor.value);
    } catch (err) {
      showError(err.message);
      return;
    }

    preview.innerHTML = html;

    try {
      renderMath(preview);
    } catch (err) {
      showError(err.message);
      return;
    }

    hideError();
    saveState();

    if (pendingScroll) {
      scrollPreviewToCursor();
      pendingScroll = false;
    }
  }

  function scheduleRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(doRender, 200);
  }

  function getCursorLine(text, pos) {
    return text.slice(0, pos).split('\n').length;
  }

  function scrollPreviewToCursor() {
    var cursorLine = getCursorLine(editor.value, editor.selectionStart);
    var blocks = preview.querySelectorAll('[data-line]');
    var target = null;
    for (var i = 0; i < blocks.length; i++) {
      var blockLine = parseInt(blocks[i].getAttribute('data-line'), 10);
      if (blockLine <= cursorLine) target = blocks[i];
      else break;
    }
    if (target) target.scrollIntoView({ block: 'nearest' });
  }

  editor.addEventListener('input', function () {
    pendingScroll = true;
    scheduleRender();
  });

  // ── Persistence ──────────────────────────────────────────────────────────
  function saveState() {
    try {
      localStorage.setItem(STORAGE_CONTENT, editor.value);
      localStorage.setItem(STORAGE_FILENAME, filenameInput.value);
    } catch (e) {}
  }

  function restoreState() {
    var content = localStorage.getItem(STORAGE_CONTENT);
    var filename = localStorage.getItem(STORAGE_FILENAME);
    if (content !== null) editor.value = content;
    filenameInput.value = filename !== null ? filename : 'untitled.md';
  }

  filenameInput.addEventListener('input', saveState);

  // ── Copy / Download ─────────────────────────────────────────────────────
  copyBtn.addEventListener('click', function () {
    navigator.clipboard.writeText(editor.value).then(function () {
      var original = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(function () {
        copyBtn.textContent = original;
        copyBtn.classList.remove('copied');
      }, 1500);
    }).catch(function (err) {
      showError('Copy failed: ' + err.message);
    });
  });

  downloadBtn.addEventListener('click', function () {
    var blob = new Blob([editor.value], { type: 'text/markdown' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filenameInput.value.trim() || 'untitled.md';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  // ── File upload (drag-and-drop + fallback picker) ───────────────────────
  function loadFile(file) {
    var reader = new FileReader();
    reader.onload = function () {
      editor.value = reader.result;
      pendingScroll = false;
      doRender();
    };
    reader.readAsText(file);
  }

  fileInput.addEventListener('change', function () {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
    fileInput.value = '';
  });

  document.body.addEventListener('dragover', function (e) {
    e.preventDefault();
    fileDrop.classList.add('drag-over');
  });

  document.body.addEventListener('dragleave', function () {
    fileDrop.classList.remove('drag-over');
  });

  document.body.addEventListener('drop', function (e) {
    e.preventDefault();
    fileDrop.classList.remove('drag-over');
    var file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  // ── Resizable split divider ─────────────────────────────────────────────
  var dragging = false;

  divider.addEventListener('pointerdown', function (e) {
    dragging = true;
    divider.classList.add('dragging');
    e.preventDefault();
  });

  window.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    var vertical = getComputedStyle(splitContainer).flexDirection === 'column';
    var rect = splitContainer.getBoundingClientRect();
    var pct = vertical
      ? ((e.clientY - rect.top) / rect.height) * 100
      : ((e.clientX - rect.left) / rect.width) * 100;
    pct = Math.min(85, Math.max(15, pct));
    editorPane.style.flex = '0 0 ' + pct + '%';
    previewPane.style.flex = '1 1 auto';
  });

  window.addEventListener('pointerup', function () {
    dragging = false;
    divider.classList.remove('dragging');
  });

  // ── Table editor dialog ──────────────────────────────────────────────────
  var colCount = 3;
  var headers  = ['', '', ''];
  var rows     = [['', '', '']];
  var editingRange = null; // { start, end } line indices being replaced, or null for insert
  var savedCursorPos = 0;

  var colCountInput        = document.getElementById('col-count-input');
  var headerInputsDiv      = document.getElementById('header-inputs');
  var tableHeaderRow       = document.getElementById('table-header-row');
  var tableBody            = document.getElementById('table-body');
  var addRowBtn            = document.getElementById('add-row-btn');
  var autoNumberCheckbox   = document.getElementById('auto-number-checkbox');
  var tableDoneBtn         = document.getElementById('table-done-btn');
  var tableCancelBtn       = document.getElementById('table-cancel-btn');

  function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

  function parseMarkdownTable(raw) {
    var lines = raw.trim().split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
    if (lines.length < 2) throw new Error('Need at least a header and separator row.');

    function parseCells(line) {
      if (!line.startsWith('|') || !line.endsWith('|')) throw new Error('Each row must start and end with |');
      return line.slice(1, -1).split('|').map(function (c) { return c.trim(); });
    }

    function isSep(line) { return /^\|[\s|:-]+\|$/.test(line); }

    var sepIdx = lines.findIndex(isSep);
    if (sepIdx === -1) throw new Error('No separator row found.');
    if (sepIdx === 0) throw new Error('Header row missing before separator.');

    var parsedHeaders = parseCells(lines[0]);
    var parsedRows = lines.slice(sepIdx + 1).map(function (l) {
      var cells = parseCells(l);
      if (cells.length !== parsedHeaders.length) throw new Error('Row cell count mismatch.');
      return cells;
    });

    if (parsedRows.length === 0) throw new Error('No data rows found after separator.');
    return { headers: parsedHeaders, rows: parsedRows };
  }

  function findTableAtCursor(text, pos) {
    var lines = text.split('\n');
    var offset = 0;
    var cursorLine = lines.length - 1;
    for (var i = 0; i < lines.length; i++) {
      if (offset + lines[i].length >= pos) { cursorLine = i; break; }
      offset += lines[i].length + 1;
    }

    if (lines[cursorLine].trim() === '') return null;

    var start = cursorLine, end = cursorLine;
    while (start > 0 && lines[start - 1].trim() !== '') start--;
    while (end < lines.length - 1 && lines[end + 1].trim() !== '') end++;

    var blockLines = lines.slice(start, end + 1);
    if (blockLines.length < 2) return null;
    if (!blockLines.every(function (l) { return l.indexOf('|') !== -1; })) return null;

    var sepIdx = blockLines.findIndex(function (l) {
      return /^\s*\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)+\|?\s*$/.test(l);
    });
    if (sepIdx === -1 || sepIdx === 0) return null;

    return { startLine: start, endLine: end, text: blockLines.join('\n') };
  }

  function resetTableState() {
    colCount = 3;
    headers = ['', '', ''];
    rows = [['', '', '']];
    autoNumberCheckbox.checked = false;
  }

  function fullRenderTable() {
    renderTableHeader();
    renderHeaderInputs();
    renderTableBody();
  }

  function renderTableHeader() {
    tableHeaderRow.innerHTML = '';
    for (var i = 0; i < colCount; i++) {
      var th = document.createElement('th');
      th.textContent = headers[i] || ('Col ' + (i + 1));
      tableHeaderRow.appendChild(th);
    }
    var spaceTh = document.createElement('th');
    spaceTh.style.width = '24px';
    tableHeaderRow.appendChild(spaceTh);
  }

  function renderHeaderInputs() {
    headerInputsDiv.innerHTML = '';
    for (var i = 0; i < colCount; i++) {
      (function (idx) {
        var col = document.createElement('div');
        col.className = 'header-col';

        var inp = document.createElement('input');
        inp.type = 'text';
        inp.placeholder = 'Col ' + (idx + 1);
        inp.value = headers[idx] || '';
        inp.addEventListener('input', function (e) {
          headers[idx] = e.target.value;
          renderTableHeader();
        });

        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'col-delete-btn';
        btn.title = 'Delete column';
        btn.textContent = '✕';
        btn.disabled = colCount <= 1;
        btn.addEventListener('click', function () { deleteColumn(idx); });

        col.appendChild(inp);
        col.appendChild(btn);
        headerInputsDiv.appendChild(col);
      })(i);
    }
  }

  function renderTableBody() {
    tableBody.innerHTML = '';
    rows.forEach(function (rowData, ri) {
      var tr = document.createElement('tr');

      var numTd = document.createElement('td');
      numTd.className = 'num-cell';
      numTd.textContent = ri + 1;
      tr.appendChild(numTd);

      for (var ci = 0; ci < colCount; ci++) {
        (function (r, c) {
          var td = document.createElement('td');
          var ta = document.createElement('textarea');
          ta.rows = 1;
          ta.value = rowData[c] || '';
          ta.addEventListener('input', function (e) { rows[r][c] = e.target.value; });
          td.appendChild(ta);
          tr.appendChild(td);
        })(ri, ci);
      }

      var delTd = document.createElement('td');
      var delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'row-delete-btn';
      delBtn.title = 'Delete row';
      delBtn.textContent = '✕';
      delBtn.disabled = rows.length <= 1;
      delBtn.addEventListener('click', function () { deleteRow(ri); });
      delTd.appendChild(delBtn);
      tr.appendChild(delTd);

      tableBody.appendChild(tr);
    });
  }

  function setColCount(n) {
    n = clamp(n, 1, 12);
    colCount = n;
    while (headers.length < colCount) headers.push('');
    headers = headers.slice(0, colCount);
    rows = rows.map(function (row) {
      while (row.length < colCount) row.push('');
      return row.slice(0, colCount);
    });
    fullRenderTable();
  }

  function deleteColumn(ci) {
    if (colCount <= 1) return;
    headers.splice(ci, 1);
    rows = rows.map(function (row) { row.splice(ci, 1); return row; });
    colCount--;
    colCountInput.value = colCount;
    fullRenderTable();
  }

  function deleteRow(ri) {
    if (rows.length <= 1) return;
    rows.splice(ri, 1);
    renderTableBody();
  }

  function addRow() {
    rows.push(new Array(colCount).fill(''));
    renderTableBody();
  }

  colCountInput.addEventListener('input', function () {
    var v = parseInt(colCountInput.value, 10);
    if (!isNaN(v)) { setColCount(v); colCountInput.value = colCount; }
  });

  addRowBtn.addEventListener('click', addRow);

  function buildTableMarkdown() {
    var useAuto = autoNumberCheckbox.checked;
    var hdrs = useAuto ? ['#'].concat(headers) : headers.slice();
    var headerLine = '| ' + hdrs.map(function (h) { return h || ' '; }).join(' | ') + ' |';
    var sepLine = '| ' + hdrs.map(function () { return '---'; }).join(' | ') + ' |';
    var dataLines = rows.map(function (row, i) {
      var cells = useAuto ? [String(i + 1)].concat(row) : row.slice();
      return '| ' + cells.map(function (c) { return c || ' '; }).join(' | ') + ' |';
    });
    return [headerLine, sepLine].concat(dataLines).join('\n');
  }

  tableBtn.addEventListener('click', function () {
    savedCursorPos = editor.selectionStart;
    var found = findTableAtCursor(editor.value, savedCursorPos);

    if (found) {
      try {
        var parsed = parseMarkdownTable(found.text);
        var hdrs = parsed.headers;
        var rws = parsed.rows;
        var autoNum = hdrs[0] === '#' && rws.every(function (r, i) { return r[0] === String(i + 1); });

        if (autoNum) {
          hdrs = hdrs.slice(1);
          rws = rws.map(function (r) { return r.slice(1); });
        }

        colCount = clamp(hdrs.length, 1, 12);
        headers = hdrs.slice(0, colCount);
        rows = rws.map(function (r) {
          r = r.slice(0, colCount);
          while (r.length < colCount) r.push('');
          return r;
        });
        autoNumberCheckbox.checked = autoNum;
        editingRange = { start: found.startLine, end: found.endLine };
      } catch (e) {
        resetTableState();
        editingRange = null;
      }
    } else {
      resetTableState();
      editingRange = null;
    }

    colCountInput.value = colCount;
    fullRenderTable();
    tableDialog.showModal();
  });

  tableCancelBtn.addEventListener('click', function () { tableDialog.close(); });

  tableDoneBtn.addEventListener('click', function () {
    var md = buildTableMarkdown();

    if (editingRange) {
      var lines = editor.value.split('\n');
      lines.splice(editingRange.start, editingRange.end - editingRange.start + 1, md);
      editor.value = lines.join('\n');
    } else {
      var before = editor.value.slice(0, savedCursorPos);
      var after = editor.value.slice(savedCursorPos);
      var prefix = before.length === 0 ? '' : (before.endsWith('\n\n') ? '' : (before.endsWith('\n') ? '\n' : '\n\n'));
      var suffix = after.length === 0 ? '' : (after.startsWith('\n\n') ? '' : (after.startsWith('\n') ? '\n' : '\n\n'));
      editor.value = before + prefix + md + suffix + after;
    }

    pendingScroll = false;
    doRender();
    tableDialog.close();
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  restoreState();
  doRender();
})();
</script>
</body>
</html>
